<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Today — James</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050506;--bg2:#0d0d0f;--s:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);
  --b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);
  --t1:#FAFAFA;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.4);--t4:rgba(255,255,255,.2);
  --green:#6ee7b7;--blue:#7DD3FC;--red:#ff8a8a;--yellow:#fbbf24;--orange:#fb923c;--purple:#a78bfa;
  --r:16px;--rs:10px;
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
body{padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) calc(80px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))}
.bento{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:12px}

/* Cards */
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--s2);color:var(--t2)}

/* Day Banner */
.day-banner{background:linear-gradient(135deg,rgba(110,231,183,.1),rgba(125,211,252,.06));border:1px solid rgba(110,231,183,.18);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px}
.day-emoji{font-size:38px;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-name{font-size:18px;font-weight:700;margin-bottom:3px}
.day-date{font-size:11px;color:var(--t3);font-family:var(--mono);letter-spacing:.06em}
.day-desc{font-size:13px;color:var(--t2);margin-top:4px}
.day-wake{text-align:right;flex-shrink:0}
.wake-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}
.wake-t{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--green)}

/* Garmin */
.garmin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.g-tile{background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);padding:10px 8px;text-align:center}
.g-val{font-size:22px;font-weight:700;font-family:var(--mono);min-height:30px;display:flex;align-items:center;justify-content:center}
.g-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-top:4px}
.g-tile.sleep .g-val{color:var(--purple)}
.g-tile.hrv .g-val{color:var(--green)}
.g-tile.rhr .g-val{color:var(--blue)}
.g-tile.dur .g-val{color:var(--yellow);font-size:16px}
.g-tile.bed .g-val,.g-tile.wkt .g-val{font-size:15px;color:var(--t2)}
.garmin-form{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.fi{background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);padding:8px 10px;color:var(--t1);font-family:var(--mono);font-size:14px;font-weight:600;width:100%;-webkit-appearance:none;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--b2)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;border-radius:var(--rs);border:1px solid var(--b);background:var(--s);color:var(--t1);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.btn:hover{background:var(--s2)}
.btn-green{background:rgba(110,231,183,.1);border-color:rgba(110,231,183,.22);color:var(--green)}
.btn-full{width:100%;margin-top:10px}

/* Schedule */
.sched-list{display:flex;flex-direction:column;gap:5px}
.sched-item{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--b)}
.sched-time{font-size:11px;font-family:var(--mono);font-weight:600;color:var(--t3);white-space:nowrap;padding-top:1px;min-width:50px}
.sched-text{font-size:13px;color:var(--t2);line-height:1.4}
.sched-item.hl{border-color:rgba(110,231,183,.2)}
.sched-item.hl .sched-time{color:var(--green)}
.sched-item.hl .sched-text{color:var(--t1);font-weight:600}
.sched-item.past{opacity:.4}

/* Habits */
.habit-list{display:flex;flex-direction:column;gap:5px}
.habit{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .15s}
.habit.done{background:rgba(110,231,183,.05);border-color:rgba(110,231,183,.16)}
.hcheck{width:20px;height:20px;border-radius:6px;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
.habit.done .hcheck{background:var(--green);border-color:var(--green);color:#000}
.hname{flex:1;font-size:13px;color:var(--t2);transition:color .15s}
.habit.done .hname{color:var(--t1)}
.hstreak{font-size:11px;font-family:var(--mono);font-weight:600;color:var(--t3);background:var(--s);padding:2px 6px;border-radius:999px}
.habit.done .hstreak{color:var(--yellow)}
.prog-bar{height:5px;background:var(--b);border-radius:999px;overflow:hidden;margin-top:12px}
.prog-fill{height:100%;background:var(--green);border-radius:999px;transition:width .4s ease}

/* Water */
.water-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.w-circle{position:relative;width:80px;height:80px;flex-shrink:0}
.w-circle svg{width:80px;height:80px;transform:rotate(-90deg)}
.w-track{fill:none;stroke:var(--b);stroke-width:6}
.w-fill{fill:none;stroke:var(--blue);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .5s ease}
.w-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.w-amt{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--blue);line-height:1}
.w-unit{font-size:8px;color:var(--t3);font-weight:600;text-transform:uppercase}
.w-info{flex:1}
.w-pct{font-size:26px;font-weight:700}
.w-tgt{font-size:12px;color:var(--t3);margin-top:2px}
.w-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.wbtn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;background:rgba(125,211,252,.07);border:1px solid rgba(125,211,252,.14);border-radius:var(--rs);cursor:pointer;color:var(--blue);font-family:var(--font);font-size:10px;font-weight:700;-webkit-tap-highlight-color:transparent;transition:background .15s}
.wbtn:hover{background:rgba(125,211,252,.14)}
.wbtn:active{opacity:.7}
.wbv{font-size:15px;font-family:var(--mono)}

/* Todos */
.todo-add{display:flex;gap:8px;margin-bottom:10px}
.todo-in{flex:1;background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);padding:9px 12px;color:var(--t1);font-family:var(--font);font-size:14px}
.todo-in:focus{outline:none;border-color:var(--b2)}
.todo-list{display:flex;flex-direction:column;gap:5px}
.todo{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs)}
.tcheck{width:18px;height:18px;border-radius:50%;border:2px solid var(--b2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.todo.done .tcheck{background:var(--green);border-color:var(--green);color:#000}
.ttxt{flex:1;font-size:13px;color:var(--t2);cursor:pointer}
.todo.done .ttxt{text-decoration:line-through;color:var(--t4)}
.tdel{background:none;border:none;color:var(--t4);cursor:pointer;font-size:18px;padding:0 2px;-webkit-tap-highlight-color:transparent;line-height:1}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(5,5,6,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b);padding:6px max(0px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(0px,env(safe-area-inset-left));z-index:100}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;text-decoration:none;color:var(--t4);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;transition:color .15s}
.ntab .ni{font-size:20px;line-height:1}
.ntab.active{color:var(--t1)}
</style>
</head>
<body>
<div class="bento">

  <!-- Day Banner -->
  <div class="day-banner">
    <div class="day-emoji" id="dEmoji"></div>
    <div class="day-info">
      <div class="day-name" id="dName"></div>
      <div class="day-date" id="dDate"></div>
      <div class="day-desc" id="dDesc"></div>
    </div>
    <div class="day-wake">
      <div class="wake-lbl">Wake</div>
      <div class="wake-t" id="dWake"></div>
    </div>
  </div>

  <!-- Garmin -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">⌚ Garmin Data</span>
      <button class="btn" id="gEditBtn" onclick="toggleGarmin()">Edit</button>
    </div>
    <div id="gDisplay">
      <div class="garmin-grid">
        <div class="g-tile sleep"><div class="g-val" id="gSleep">—</div><div class="g-lbl">Sleep Score</div></div>
        <div class="g-tile hrv"><div class="g-val" id="gHrv">—</div><div class="g-lbl">HRV ms</div></div>
        <div class="g-tile rhr"><div class="g-val" id="gRhr">—</div><div class="g-lbl">RHR bpm</div></div>
        <div class="g-tile bed"><div class="g-val" id="gBed">—</div><div class="g-lbl">Bedtime</div></div>
        <div class="g-tile wkt"><div class="g-val" id="gWake">—</div><div class="g-lbl">Wake</div></div>
        <div class="g-tile dur"><div class="g-val" id="gDur">—</div><div class="g-lbl">Duration</div></div>
      </div>
    </div>
    <div id="gForm" style="display:none">
      <div class="garmin-form">
        <div class="fg"><label class="fl">Sleep Score</label><input class="fi" id="fSleep" type="number" placeholder="85"></div>
        <div class="fg"><label class="fl">HRV (ms)</label><input class="fi" id="fHrv" type="number" placeholder="65"></div>
        <div class="fg"><label class="fl">RHR (bpm)</label><input class="fi" id="fRhr" type="number" placeholder="48"></div>
        <div class="fg"><label class="fl">Bedtime</label><input class="fi" id="fBed" type="time"></div>
        <div class="fg"><label class="fl">Wake Time</label><input class="fi" id="fWake" type="time"></div>
        <div class="fg"><label class="fl">Duration</label><input class="fi" id="fDur" type="text" placeholder="8h 20m"></div>
      </div>
      <button class="btn btn-green btn-full" onclick="saveGarmin()">Save</button>
    </div>
  </div>

  <!-- Schedule -->
  <div class="card">
    <div class="card-hd"><span class="card-title">📅 Today's Schedule</span></div>
    <div class="sched-list" id="schedList"></div>
  </div>

  <!-- Habits -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">✅ Daily Habits</span>
      <span class="badge" id="hBadge">0/8</span>
    </div>
    <div class="habit-list" id="habitList"></div>
    <div class="prog-bar"><div class="prog-fill" id="hProg" style="width:0%"></div></div>
  </div>

  <!-- Water -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">💧 Hydration</span>
      <span class="badge" id="wBadge">0 ml</span>
    </div>
    <div class="water-row">
      <div class="w-circle">
        <svg viewBox="0 0 80 80">
          <circle class="w-track" cx="40" cy="40" r="33"/>
          <circle class="w-fill" cx="40" cy="40" r="33" id="wRing" stroke-dasharray="207.3" stroke-dashoffset="207.3"/>
        </svg>
        <div class="w-txt"><div class="w-amt" id="wAmt">0</div><div class="w-unit">ml</div></div>
      </div>
      <div class="w-info">
        <div class="w-pct" id="wPct">0%</div>
        <div class="w-tgt" id="wTgt">Target: — L</div>
        <button class="btn" onclick="resetWater()" style="font-size:11px;padding:5px 10px;margin-top:8px">Reset</button>
      </div>
    </div>
    <div class="w-btns">
      <button class="wbtn" onclick="addWater(250)"><span class="wbv">+250</span><span>glass</span></button>
      <button class="wbtn" onclick="addWater(500)"><span class="wbv">+500</span><span>bottle</span></button>
      <button class="wbtn" onclick="addWater(750)"><span class="wbv">+750</span><span>large</span></button>
    </div>
  </div>

  <!-- Todos -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">📋 To-Do</span>
      <span class="badge" id="tBadge">🔥 0</span>
    </div>
    <div class="todo-add">
      <input class="todo-in" id="tIn" placeholder="Add task…" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="btn btn-green" onclick="addTodo()">+</button>
    </div>
    <div class="todo-list" id="tList"></div>
  </div>

</div>

<nav class="bnav">
  <a href="index.html" class="ntab active"><span class="ni">🏠</span><span>Today</span></a>
  <a href="football.html" class="ntab"><span class="ni">⚽</span><span>Football</span></a>
  <a href="study.html" class="ntab"><span class="ni">📚</span><span>Study</span></a>
  <a href="gym.html" class="ntab"><span class="ni">🏋️</span><span>Gym</span></a>
  <a href="goals.html" class="ntab"><span class="ni">🎯</span><span>Goals</span></a>
  <a href="finance.html" class="ntab"><span class="ni">💰</span><span>Finance</span></a>
</nav>

<script>
// Utils
const $ = id => document.getElementById(id);
function dk(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function ls(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// Day types
const DAY={
  0:{name:'Recovery Day',       emoji:'🧘',wake:'08:00',desc:'Rest · gym session · recovery',water:2000},
  1:{name:'Evening Training',   emoji:'⚽',wake:'07:30',desc:'Club training 18:00–19:30',     water:2500},
  2:{name:'Morning Training',   emoji:'🌅',wake:'06:15',desc:'Training 07:30–09:00',          water:2500},
  3:{name:'Free Day',           emoji:'📖',wake:'07:30',desc:'Study & recovery',              water:2000},
  4:{name:'Morning Training',   emoji:'🌅',wake:'06:15',desc:'Training 07:30–09:00',          water:2500},
  5:{name:'Free Day',           emoji:'📚',wake:'07:30',desc:'Study & recovery',              water:2000},
  6:{name:'Match Day',          emoji:'🏆',wake:'07:00',desc:'Pre-match prep · Treaty U20s',  water:2500},
};
const SCHED={
  0:[{t:'08:00',tx:'Wake up',h:0},{t:'10:00',tx:'Gym — Sunday programme',h:1},{t:'11:30',tx:'Recovery: foam roll + stretch',h:0},{t:'13:00',tx:'Lunch + nutrition',h:0},{t:'15:00',tx:'Study block',h:0},{t:'21:30',tx:'Phone down · journal · skincare',h:1}],
  1:[{t:'07:30',tx:'Wake up',h:0},{t:'08:00',tx:'Morning routine · skincare · SPF',h:0},{t:'09:00',tx:'School',h:0},{t:'15:00',tx:'Study block',h:0},{t:'17:30',tx:'Pre-training meal',h:0},{t:'18:00',tx:'Club training — Treaty U20s',h:1},{t:'19:30',tx:'Training ends',h:0},{t:'20:00',tx:'Post-training nutrition (30 min window)',h:1},{t:'21:30',tx:'Phone down · journal · skincare',h:1}],
  2:[{t:'06:15',tx:'Wake up',h:0},{t:'06:30',tx:'Quick breakfast + kit',h:0},{t:'07:30',tx:'Club training — Treaty U20s',h:1},{t:'09:30',tx:'Home · post-training nutrition',h:1},{t:'10:00',tx:'School',h:0},{t:'16:00',tx:'Study block',h:0},{t:'21:30',tx:'Phone down · journal · skincare',h:1}],
  3:[{t:'07:30',tx:'Wake up',h:0},{t:'08:00',tx:'Morning routine · skincare · SPF',h:0},{t:'09:00',tx:'School',h:0},{t:'14:30',tx:'Gym — Wednesday programme',h:1},{t:'16:30',tx:'Study block',h:0},{t:'21:30',tx:'Phone down · journal · skincare',h:1}],
  4:[{t:'06:15',tx:'Wake up',h:0},{t:'07:30',tx:'Club training — Treaty U20s',h:1},{t:'09:30',tx:'Home · post-training nutrition',h:1},{t:'10:00',tx:'School',h:0},{t:'16:00',tx:'Study block',h:0},{t:'21:30',tx:'Phone down · journal · skincare',h:1}],
  5:[{t:'07:30',tx:'Wake up',h:0},{t:'08:00',tx:'Morning routine · skincare · SPF',h:0},{t:'09:00',tx:'School',h:0},{t:'15:00',tx:'Study / individual football session',h:0},{t:'21:30',tx:'Phone down · journal · skincare',h:1}],
  6:[{t:'07:00',tx:'Wake up',h:0},{t:'07:30',tx:'Breakfast (3h pre-match)',h:0},{t:'09:00',tx:'3-Action Rule mental prep',h:1},{t:'09:30',tx:'Dynamic warm-up + activation',h:0},{t:'11:00',tx:'Match — Treaty United U20s',h:1},{t:'13:00',tx:'Post-match nutrition',h:1},{t:'14:00',tx:'Recovery + stretch',h:0},{t:'21:30',tx:'Phone down · journal · skincare',h:1}],
};
const now=new Date(),dow=now.getDay(),di=DAY[dow];

// Day banner
(function(){
  $('dEmoji').textContent=di.emoji;$('dName').textContent=di.name;$('dDesc').textContent=di.desc;$('dWake').textContent=di.wake;
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  $('dDate').textContent=DAYS[dow]+' · '+now.getDate()+' '+MONS[now.getMonth()]+' '+now.getFullYear();
})();

// Schedule
(function(){
  const items=SCHED[dow]||[];
  const cur=now.getHours()*60+now.getMinutes();
  $('schedList').innerHTML=items.map(s=>{
    const[h,m]=s.t.split(':').map(Number);
    return`<div class="sched-item${s.h?' hl':''}${(h*60+m)<cur?' past':''}">
      <div class="sched-time">${s.t}</div><div class="sched-text">${s.tx}</div></div>`;
  }).join('');
})();

// Garmin
const GK='jm_garmin_'+dk();
function loadGarmin(){
  const d=ls(GK,null);if(!d)return;
  $('gSleep').textContent=d.sleep||'—';$('gHrv').textContent=d.hrv||'—';$('gRhr').textContent=d.rhr||'—';
  $('gBed').textContent=d.bed||'—';$('gWake').textContent=d.wake||'—';$('gDur').textContent=d.dur||'—';
}
function toggleGarmin(){
  const f=$('gForm'),btn=$('gEditBtn'),open=f.style.display!=='none';
  f.style.display=open?'none':'block';btn.textContent=open?'Edit':'Cancel';
  if(!open){const d=ls(GK,{});$('fSleep').value=d.sleep||'';$('fHrv').value=d.hrv||'';$('fRhr').value=d.rhr||'';$('fBed').value=d.bed||'';$('fWake').value=d.wake||'';$('fDur').value=d.dur||'';}
}
function saveGarmin(){
  lss(GK,{sleep:$('fSleep').value,hrv:$('fHrv').value,rhr:$('fRhr').value,bed:$('fBed').value,wake:$('fWake').value,dur:$('fDur').value});
  loadGarmin();toggleGarmin();
}
loadGarmin();

// Habits
const HABITS=[
  {id:'am-skin',name:'Morning skincare',e:'🌅'},
  {id:'pm-skin',name:'Evening skincare',e:'🌙'},
  {id:'retainer',name:'Retainer',e:'🦷'},
  {id:'spf',name:'SPF applied',e:'☀️'},
  {id:'journal',name:'Journal entry',e:'📓'},
  {id:'phone',name:'Phone down by 21:30',e:'📵'},
  {id:'water',name:'Water target hit',e:'💧'},
  {id:'nutrition',name:'Post-training nutrition',e:'🥗'},
];
const HK='jm_habits_'+dk();
function hStreak(id){
  let s=0,d=new Date();d.setDate(d.getDate()-1);
  for(let i=0;i<180;i++){if(ls('jm_habits_'+dk(d),{})[id])s++;else break;d.setDate(d.getDate()-1);}
  return s;
}
function renderHabits(){
  const data=ls(HK,{});const done=HABITS.filter(h=>data[h.id]).length;
  $('hBadge').textContent=done+'/'+HABITS.length;
  $('hProg').style.width=(done/HABITS.length*100)+'%';
  $('habitList').innerHTML=HABITS.map(h=>{
    const ok=!!data[h.id];const s=hStreak(h.id);
    return`<div class="habit${ok?' done':''}" onclick="toggleHabit('${h.id}')">
      <div class="hcheck">${ok?'✓':''}</div>
      <span style="font-size:16px;flex-shrink:0">${h.e}</span>
      <span class="hname">${h.name}</span>
      <span class="hstreak">${s>0?'🔥'+s:'—'}</span>
    </div>`;
  }).join('');
}
function toggleHabit(id){const d=ls(HK,{});d[id]=!d[id];lss(HK,d);renderHabits();}
renderHabits();

// Water
const WK='jm_water_'+dk();const WT=di.water;
function renderWater(){
  const ml=ls(WK,0);const pct=Math.min(1,ml/WT);
  $('wAmt').textContent=ml;$('wPct').textContent=Math.round(pct*100)+'%';
  $('wTgt').textContent='Target: '+(WT/1000).toFixed(1)+'L';
  $('wBadge').textContent=(ml/1000).toFixed(2)+'L / '+(WT/1000).toFixed(1)+'L';
  $('wRing').style.strokeDashoffset=207.3*(1-pct);
  if(ml>=WT){const d=ls(HK,{});if(!d.water){d.water=true;lss(HK,d);renderHabits();}}
}
function addWater(ml){lss(WK,ls(WK,0)+ml);renderWater();}
function resetWater(){if(confirm('Reset water to 0?')){lss(WK,0);renderWater();}}
renderWater();

// Todos
const TK='jm_todos';
function renderTodos(){
  const todos=ls(TK,[]);
  $('tBadge').textContent='✓ '+todos.filter(t=>t.done).length+'/'+todos.length;
  if(!todos.length){$('tList').innerHTML='<div style="color:var(--t3);font-size:13px;text-align:center;padding:16px">No tasks · add one above</div>';return;}
  $('tList').innerHTML=todos.map((t,i)=>`
    <div class="todo${t.done?' done':''}">
      <div class="tcheck" onclick="toggleTodo(${i})">${t.done?'✓':''}</div>
      <span class="ttxt" onclick="toggleTodo(${i})">${t.text}</span>
      <button class="tdel" onclick="delTodo(${i})">×</button>
    </div>`).join('');
}
function addTodo(){const inp=$('tIn');const tx=inp.value.trim();if(!tx)return;const t=ls(TK,[]);t.unshift({text:tx,done:false});lss(TK,t);inp.value='';renderTodos();}
function toggleTodo(i){const t=ls(TK,[]);t[i].done=!t[i].done;lss(TK,t);renderTodos();}
function delTodo(i){const t=ls(TK,[]);t.splice(i,1);lss(TK,t);renderTodos();}
renderTodos();
</script>
</body>
</html>
