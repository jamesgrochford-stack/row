<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Finance — James</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050506;--bg2:#0d0d0f;--s:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);
  --b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);
  --t1:#FAFAFA;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.4);--t4:rgba(255,255,255,.2);
  --green:#6ee7b7;--blue:#7DD3FC;--red:#ff8a8a;--yellow:#fbbf24;--orange:#fb923c;--purple:#a78bfa;
  --r:16px;--rs:10px;
  --font:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
body{padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) calc(80px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))}
.bento{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;background:var(--s2);color:var(--t2)}
.badge-red{background:rgba(255,138,138,.15);color:var(--red)}
.badge-green{background:rgba(110,231,183,.12);color:var(--green)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 14px;border-radius:var(--rs);border:1px solid var(--b);background:var(--s);color:var(--t1);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.btn:hover{background:var(--s2)}
.btn-green{border-color:rgba(110,231,183,.3);background:rgba(110,231,183,.08);color:var(--green)}
.input{display:block;width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--b);border-radius:var(--rs);color:var(--t1);font-family:var(--font);font-size:14px;outline:none;-webkit-appearance:none}
.input:focus{border-color:var(--b2)}
.row{display:flex;gap:8px}
.row .input{flex:1}

/* Net worth hero */
.nw-hero{text-align:center;padding:10px 0 16px}
.nw-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.nw-amount{font-size:52px;font-weight:700;font-family:var(--mono);line-height:1}
.nw-breakdown{font-size:12px;color:var(--t3);margin-top:8px}

/* Savings */
.sav-bar{height:8px;background:var(--b);border-radius:999px;overflow:hidden;margin:10px 0 4px}
.sav-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:999px;transition:width .4s}
.sav-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--t3)}

/* Spending log */
.spend-item{display:flex;align-items:center;padding:9px 12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:6px}
.spend-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:999px;margin-right:10px;flex-shrink:0}
.spend-cat.food{background:rgba(251,191,36,.12);color:var(--yellow)}
.spend-cat.transport{background:rgba(125,211,252,.12);color:var(--blue)}
.spend-cat.clothes{background:rgba(167,139,250,.12);color:var(--purple)}
.spend-cat.subscriptions{background:rgba(251,146,60,.12);color:var(--orange)}
.spend-cat.other{background:var(--s2);color:var(--t2)}
.spend-desc{flex:1;font-size:13px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spend-amt{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--red);margin-left:10px}
.spend-del{background:none;border:none;color:var(--t4);font-size:16px;cursor:pointer;padding:0 0 0 8px;-webkit-tap-highlight-color:transparent;line-height:1}

/* Subscriptions */
.sub-item{display:flex;align-items:center;padding:10px 12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:6px}
.sub-icon{font-size:22px;margin-right:10px}
.sub-body{flex:1}
.sub-name{font-size:14px;font-weight:600;color:var(--t1)}
.sub-renews{font-size:11px;color:var(--t3);margin-top:2px}
.sub-amt{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--t2)}
.sub-warn{color:var(--red)}

/* Wishlist */
.wish-item{display:flex;align-items:center;padding:10px 12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.wish-item.bought{background:rgba(110,231,183,.04);border:1px solid rgba(110,231,183,.1)}
.wish-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;margin-right:10px;flex-shrink:0;transition:all .15s}
.wish-item.bought .wish-check{background:var(--green);border-color:var(--green);color:#000}
.wish-name{flex:1;font-size:13px;color:var(--t1)}
.wish-item.bought .wish-name{text-decoration:line-through;color:var(--t3)}
.wish-price{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--t2);margin-right:8px}
.wish-del{background:none;border:none;color:var(--t4);font-size:16px;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}

/* Vinted */
.vinted-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.vstat{background:var(--bg2);border-radius:var(--rs);padding:10px;text-align:center}
.vstat-num{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--green)}
.vstat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-top:3px}
.vsale-item{display:flex;align-items:center;padding:8px 12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:5px;font-size:13px;gap:8px}
.vsale-desc{flex:1;color:var(--t1)}
.vsale-amt{font-family:var(--mono);font-weight:600;color:var(--green)}
.vsale-del{background:none;border:none;color:var(--t4);font-size:16px;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}

.bnav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(5,5,6,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--b);padding:6px max(0px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(0px,env(safe-area-inset-left));z-index:100}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;text-decoration:none;color:var(--t4);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;transition:color .15s}
.ntab .ni{font-size:20px;line-height:1}
.ntab.active{color:var(--t1)}
</style>
</head>
<body>
<div class="bento">

  <!-- Net Worth -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">💰 Net Worth</span>
      <span class="badge badge-green" id="nwBadge">€0</span>
    </div>
    <div class="nw-hero">
      <div class="nw-label">Total</div>
      <div class="nw-amount" id="nwAmount">€0</div>
      <div class="nw-breakdown" id="nwBreakdown">Savings €0 · Spending €0</div>
    </div>
  </div>

  <!-- Savings -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">🏦 Savings</span>
      <span class="badge" id="savPct">0%</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px">Current savings</div>
        <input class="input" id="savCurrent" type="number" step="1" min="0" placeholder="0" oninput="saveSavings()">
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:5px">Target</div>
        <input class="input" id="savTarget" type="number" step="1" min="0" placeholder="1000" oninput="saveSavings()">
      </div>
    </div>
    <div class="sav-bar"><div class="sav-fill" id="savFill" style="width:0%"></div></div>
    <div class="sav-labels"><span id="savLeft">€0 to go</span><span id="savTargetLabel">€0 target</span></div>
  </div>

  <!-- Spending Log -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">💸 Spending Log</span>
      <span class="badge badge-red" id="spendTotal">€0 this month</span>
    </div>
    <div class="row" style="margin-bottom:8px">
      <select class="input" id="spendCat" style="flex:0 0 auto;width:auto">
        <option value="food">Food</option>
        <option value="transport">Transport</option>
        <option value="clothes">Clothes</option>
        <option value="subscriptions">Subscriptions</option>
        <option value="other">Other</option>
      </select>
      <input class="input" id="spendDesc" placeholder="Description" type="text">
      <input class="input" id="spendAmt" placeholder="€0" type="number" step="0.01" min="0" style="flex:0 0 80px">
    </div>
    <button class="btn" style="width:100%;margin-bottom:12px" onclick="addSpend()">+ Add</button>
    <div id="spendList"></div>
  </div>

  <!-- Subscriptions -->
  <div class="card">
    <div class="card-hd"><span class="card-title">🔄 Subscriptions</span></div>
    <div id="subList"></div>
  </div>

  <!-- Wishlist -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">🛒 Wishlist</span>
      <span class="badge" id="wishBadge">€0 total</span>
    </div>
    <div class="row" style="margin-bottom:8px">
      <input class="input" id="wishName" placeholder="Item name" type="text">
      <input class="input" id="wishPrice" placeholder="€0" type="number" step="0.01" min="0" style="flex:0 0 80px">
    </div>
    <button class="btn" style="width:100%;margin-bottom:12px" onclick="addWish()">+ Add</button>
    <div id="wishList"></div>
  </div>

  <!-- Vinted Income -->
  <div class="card">
    <div class="card-hd">
      <span class="card-title">🏷️ Vinted Income</span>
      <span class="badge badge-green" id="vintedBadge">€0</span>
    </div>
    <div class="vinted-stats">
      <div class="vstat"><div class="vstat-num" id="vtTotal">€0</div><div class="vstat-label">Total</div></div>
      <div class="vstat"><div class="vstat-num" id="vtMonth">€0</div><div class="vstat-label">This month</div></div>
      <div class="vstat"><div class="vstat-num" id="vtSales">0</div><div class="vstat-label">Sales</div></div>
    </div>
    <div class="row" style="margin-bottom:8px">
      <input class="input" id="vtDesc" placeholder="Item sold" type="text">
      <input class="input" id="vtAmt" placeholder="€0" type="number" step="0.01" min="0" style="flex:0 0 80px">
    </div>
    <button class="btn btn-green" style="width:100%;margin-bottom:12px" onclick="addVinted()">+ Log sale</button>
    <div id="vtList"></div>
  </div>

</div>

<nav class="bnav">
  <a href="index.html" class="ntab"><span class="ni">🏠</span><span>Today</span></a>
  <a href="football.html" class="ntab"><span class="ni">⚽</span><span>Football</span></a>
  <a href="study.html" class="ntab"><span class="ni">📚</span><span>Study</span></a>
  <a href="gym.html" class="ntab"><span class="ni">🏋️</span><span>Gym</span></a>
  <a href="goals.html" class="ntab"><span class="ni">🎯</span><span>Goals</span></a>
  <a href="finance.html" class="ntab active"><span class="ni">💰</span><span>Finance</span></a>
</nav>

<script>
const $ = id => document.getElementById(id);
function ls(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function fmt(n){return '€'+Math.abs(n).toFixed(2).replace(/\.00$/,'')}

// ── Savings ──────────────────────────────────────────────────────────────────
function saveSavings(){
  const cur=parseFloat($('savCurrent').value)||0;
  const tgt=parseFloat($('savTarget').value)||0;
  lss('jm_savings',{cur,tgt});
  renderSavings(cur,tgt);
  renderNetWorth();
}
function renderSavings(cur,tgt){
  const pct=tgt>0?Math.min(100,cur/tgt*100):0;
  $('savFill').style.width=pct+'%';
  $('savPct').textContent=pct.toFixed(0)+'%';
  $('savLeft').textContent=tgt>cur?fmt(tgt-cur)+' to go':'Goal reached 🎉';
  $('savTargetLabel').textContent=fmt(tgt)+' target';
}
(function(){const s=ls('jm_savings',{cur:0,tgt:0});$('savCurrent').value=s.cur||'';$('savTarget').value=s.tgt||'';renderSavings(s.cur||0,s.tgt||0);})();

// ── Spending ──────────────────────────────────────────────────────────────────
const thisMonth=new Date().toISOString().slice(0,7);
function addSpend(){
  const cat=$('spendCat').value;
  const desc=$('spendDesc').value.trim();
  const amt=parseFloat($('spendAmt').value)||0;
  if(!desc||!amt)return;
  const list=ls('jm_spending',[]);
  list.push({cat,desc,amt,date:new Date().toISOString()});
  lss('jm_spending',list);
  $('spendDesc').value='';$('spendAmt').value='';
  renderSpend();renderNetWorth();
}
function delSpend(i){const list=ls('jm_spending',[]);list.splice(i,1);lss('jm_spending',list);renderSpend();renderNetWorth();}
function renderSpend(){
  const list=ls('jm_spending',[]);
  const monthTotal=list.filter(s=>s.date.startsWith(thisMonth)).reduce((a,s)=>a+s.amt,0);
  $('spendTotal').textContent=fmt(monthTotal)+' this month';
  $('spendList').innerHTML=list.slice().reverse().slice(0,20).map((s,ri)=>{
    const i=list.length-1-ri;
    return`<div class="spend-item">
      <span class="spend-cat ${s.cat}">${s.cat}</span>
      <span class="spend-desc">${esc(s.desc)}</span>
      <span class="spend-amt">-${fmt(s.amt)}</span>
      <button class="spend-del" onclick="delSpend(${i})">×</button>
    </div>`;
  }).join('')||'<div style="font-size:13px;color:var(--t3);text-align:center;padding:12px 0">No spending logged</div>';
}
renderSpend();

// ── Subscriptions ─────────────────────────────────────────────────────────────
const SUBS=[
  {icon:'🤖',name:'Claude Pro',amt:18,dayOfMonth:25,currency:'€'},
];
function renderSubs(){
  const today=new Date().getDate();
  $('subList').innerHTML=SUBS.map(s=>{
    const daysLeft=s.dayOfMonth>=today?s.dayOfMonth-today:s.dayOfMonth+(new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate()-today);
    const soon=daysLeft<=5;
    return`<div class="sub-item">
      <span class="sub-icon">${s.icon}</span>
      <div class="sub-body">
        <div class="sub-name">${s.name}</div>
        <div class="sub-renews ${soon?'sub-warn':''}">Renews in ${daysLeft} day${daysLeft!==1?'s':''} ${soon?'⚠️':''}</div>
      </div>
      <span class="sub-amt">${s.currency}${s.amt}/mo</span>
    </div>`;
  }).join('');
}
renderSubs();

// ── Wishlist ──────────────────────────────────────────────────────────────────
function addWish(){
  const name=$('wishName').value.trim();
  const price=parseFloat($('wishPrice').value)||0;
  if(!name)return;
  const list=ls('jm_wishlist',[]);
  list.push({name,price,bought:false});
  lss('jm_wishlist',list);
  $('wishName').value='';$('wishPrice').value='';
  renderWish();
}
function toggleWish(i){const list=ls('jm_wishlist',[]);list[i].bought=!list[i].bought;lss('jm_wishlist',list);renderWish();}
function delWish(i,e){e.stopPropagation();const list=ls('jm_wishlist',[]);list.splice(i,1);lss('jm_wishlist',list);renderWish();}
function renderWish(){
  const list=ls('jm_wishlist',[]);
  const remaining=list.filter(w=>!w.bought).reduce((a,w)=>a+w.price,0);
  $('wishBadge').textContent=fmt(remaining)+' remaining';
  $('wishList').innerHTML=list.map((w,i)=>`
    <div class="wish-item${w.bought?' bought':''}" onclick="toggleWish(${i})">
      <div class="wish-check">${w.bought?'✓':''}</div>
      <span class="wish-name">${esc(w.name)}</span>
      <span class="wish-price">${fmt(w.price)}</span>
      <button class="wish-del" onclick="delWish(${i},event)">×</button>
    </div>`).join('')||'<div style="font-size:13px;color:var(--t3);text-align:center;padding:12px 0">Wishlist empty</div>';
}
renderWish();

// ── Vinted ────────────────────────────────────────────────────────────────────
function addVinted(){
  const desc=$('vtDesc').value.trim();
  const amt=parseFloat($('vtAmt').value)||0;
  if(!desc||!amt)return;
  const list=ls('jm_vinted',[]);
  list.push({desc,amt,date:new Date().toISOString()});
  lss('jm_vinted',list);
  $('vtDesc').value='';$('vtAmt').value='';
  renderVinted();renderNetWorth();
}
function delVinted(i){const list=ls('jm_vinted',[]);list.splice(i,1);lss('jm_vinted',list);renderVinted();renderNetWorth();}
function renderVinted(){
  const list=ls('jm_vinted',[]);
  const total=list.reduce((a,v)=>a+v.amt,0);
  const monthTotal=list.filter(v=>v.date.startsWith(thisMonth)).reduce((a,v)=>a+v.amt,0);
  $('vtTotal').textContent=fmt(total);
  $('vtMonth').textContent=fmt(monthTotal);
  $('vtSales').textContent=list.length;
  $('vintedBadge').textContent=fmt(total)+' earned';
  $('vtList').innerHTML=list.slice().reverse().slice(0,10).map((v,ri)=>{
    const i=list.length-1-ri;
    return`<div class="vsale-item">
      <span class="vsale-desc">${esc(v.desc)}</span>
      <span class="vsale-amt">+${fmt(v.amt)}</span>
      <button class="vsale-del" onclick="delVinted(${i})">×</button>
    </div>`;
  }).join('')||'<div style="font-size:13px;color:var(--t3);text-align:center;padding:12px 0">No sales yet</div>';
}
renderVinted();

// ── Net Worth ─────────────────────────────────────────────────────────────────
function renderNetWorth(){
  const sav=ls('jm_savings',{cur:0}).cur||0;
  const spend=ls('jm_spending',[]).reduce((a,s)=>a+s.amt,0);
  const vinted=ls('jm_vinted',[]).reduce((a,v)=>a+v.amt,0);
  const net=sav+vinted-spend;
  $('nwAmount').textContent=fmt(net);
  $('nwAmount').style.color=net>=0?'var(--green)':'var(--red)';
  $('nwBadge').textContent=fmt(net);
  $('nwBreakdown').textContent='Savings '+fmt(sav)+' · Vinted +'+fmt(vinted)+' · Spending -'+fmt(spend);
}
renderNetWorth();

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
